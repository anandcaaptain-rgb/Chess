<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Final Boss Chess</title>

<style>
body { font-family: Arial; text-align:center; background:#111; color:white; }
#board {
  display:grid;
  grid-template-columns: repeat(8,70px);
  width:560px;
  margin:20px auto;
  border:3px solid white;
}
.cell {
  width:70px; height:70px;
  display:flex; align-items:center; justify-content:center;
  font-size:34px; cursor:pointer;
}
.white{background:#eee; color:black;}
.black{background:#444;}
.highlight{background:#00aa00 !important;}
.selected{outline:3px solid yellow;}

textarea{width:90%;height:60px;}
button{margin:5px;padding:8px;}
</style>
</head>

<body>

<h2>🔥 Final Boss Chess (Single File)</h2>

<button onclick="createOffer()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>

<p>Share code:</p>
<textarea id="code"></textarea>

<p>Paste opponent code:</p>
<textarea id="remote"></textarea>
<button onclick="connect()">Connect</button>

<div id="board"></div>

<script>

let board = [
["r","n","b","q","k","b","n","r"],
["p","p","p","p","p","p","p","p"],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["P","P","P","P","P","P","P","P"],
["R","N","B","Q","K","B","N","R"]
];

let turn="w";
let selected=null;
let legal=[];

const boardDiv=document.getElementById("board");

function isWhite(p){ return p && p===p.toUpperCase(); }

function draw(){
 boardDiv.innerHTML="";
 for(let r=0;r<8;r++){
  for(let c=0;c<8;c++){
    let d=document.createElement("div");
    d.className="cell "+((r+c)%2?"black":"white");

    if(selected && selected[0]==r && selected[1]==c)
      d.classList.add("selected");

    if(legal.some(m=>m[0]==r && m[1]==c))
      d.classList.add("highlight");

    d.innerText=board[r][c];
    d.onclick=()=>clickCell(r,c);
    boardDiv.appendChild(d);
  }
 }
}

function clickCell(r,c){
 let p = board[r][c];

 if(selected){
   if(legal.some(m=>m[0]==r && m[1]==c)){
     sendMove(selected[0],selected[1],r,c);
     move(selected[0],selected[1],r,c);
     turn = turn==="w"?"b":"w";
   }
   selected=null;
   legal=[];
 } else {
   if(p && ((turn==="w" && isWhite(p)) || (turn==="b" && !isWhite(p)))){
     selected=[r,c];
     legal=getLegalMoves(r,c);
   }
 }
 draw();
}

function inBounds(r,c){ return r>=0&&r<8&&c>=0&&c<8; }

function rawMoves(r,c){
 let p=board[r][c];
 if(!p) return [];
 let moves=[];
 let dr,dc;

 if(p==="P"){
   if(board[r-1]?.[c]==="") moves.push([r-1,c]);
   if(r==6 && board[4][c]==="") moves.push([4,c]);
   for(let d of [-1,1]){
     if(board[r-1]?.[c+d] && !isWhite(board[r-1][c+d]))
       moves.push([r-1,c+d]);
   }
 }

 if(p==="p"){
   if(board[r+1]?.[c]==="") moves.push([r+1,c]);
   if(r==1 && board[3][c]==="") moves.push([3,c]);
   for(let d of [-1,1]){
     if(board[r+1]?.[c+d] && isWhite(board[r+1][c+d]))
       moves.push([r+1,c+d]);
   }
 }

 if("rRqQ".includes(p)){
   for(let [dr,dc] of [[1,0],[-1,0],[0,1],[0,-1]]){
     let nr=r+dr,nc=c+dc;
     while(inBounds(nr,nc)){
       if(board[nr][nc]===""){ moves.push([nr,nc]); }
       else{
         if(isWhite(board[nr][nc])!=isWhite(p)) moves.push([nr,nc]);
         break;
       }
       nr+=dr; nc+=dc;
     }
   }
 }

 if("bBqQ".includes(p)){
   for(let [dr,dc] of [[1,1],[1,-1],[-1,1],[-1,-1]]){
     let nr=r+dr,nc=c+dc;
     while(inBounds(nr,nc)){
       if(board[nr][nc]===""){ moves.push([nr,nc]); }
       else{
         if(isWhite(board[nr][nc])!=isWhite(p)) moves.push([nr,nc]);
         break;
       }
       nr+=dr; nc+=dc;
     }
   }
 }

 if("nN".includes(p)){
   for(let [dr,dc] of [[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]]){
     let nr=r+dr,nc=c+dc;
     if(inBounds(nr,nc) && (!board[nr][nc] || isWhite(board[nr][nc])!=isWhite(p)))
       moves.push([nr,nc]);
   }
 }

 if("kK".includes(p)){
   for(let dr=-1;dr<=1;dr++){
     for(let dc=-1;dc<=1;dc++){
       if(dr||dc){
         let nr=r+dr,nc=c+dc;
         if(inBounds(nr,nc) && (!board[nr][nc] || isWhite(board[nr][nc])!=isWhite(p)))
           moves.push([nr,nc]);
       }
     }
   }
 }

 return moves;
}

function cloneBoard(b){ return JSON.parse(JSON.stringify(b)); }

function findKing(color,b){
 for(let r=0;r<8;r++)
  for(let c=0;c<8;c++)
   if(b[r][c]===(color==="w"?"K":"k")) return [r,c];
}

function inCheck(color,b){
 let [kr,kc]=findKing(color,b);
 for(let r=0;r<8;r++){
  for(let c=0;c<8;c++){
   let p=b[r][c];
   if(p && (isWhite(p)!=(color==="w"))){
     let moves=rawMoves(r,c);
     if(moves.some(m=>m[0]==kr && m[1]==kc)) return true;
   }
  }
 }
 return false;
}

function getLegalMoves(r,c){
 let p=board[r][c];
 let color=isWhite(p)?"w":"b";
 let moves=[];
 for(let [er,ec] of rawMoves(r,c)){
   let b=cloneBoard(board);
   b[er][ec]=b[r][c];
   b[r][c]="";
   if(!inCheck(color,b)) moves.push([er,ec]);
 }
 return moves;
}

function move(sr,sc,er,ec){
 board[er][ec]=board[sr][sc];
 board[sr][sc]="";
}

//// P2P ////

let pc = new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});
let channel;

function setupChannel(ch){
 channel=ch;
 channel.onmessage=e=>{
  let m=JSON.parse(e.data);
  move(m.sr,m.sc,m.er,m.ec);
  turn=turn==="w"?"b":"w";
  draw();
 };
}

async function createOffer(){
 let ch=pc.createDataChannel("chess");
 setupChannel(ch);
 let offer=await pc.createOffer();
 await pc.setLocalDescription(offer);
}

async function joinRoom(){
 pc.ondatachannel=e=>setupChannel(e.channel);
}

async function connect(){
 let remote=JSON.parse(document.getElementById("remote").value);
 await pc.setRemoteDescription(remote);
 if(remote.type==="offer"){
  let ans=await pc.createAnswer();
  await pc.setLocalDescription(ans);
 }
}

pc.onicecandidate=e=>{
 if(!e.candidate){
  document.getElementById("code").value=JSON.stringify(pc.localDescription);
 }
};

function sendMove(sr,sc,er,ec){
 if(channel) channel.send(JSON.stringify({sr,sc,er,ec}));
}

draw();

</script>

</body>
</html>
