<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>anand chess</title>
<style>
body {margin:0; display:flex; flex-direction:column; align-items:center; background:#333; font-family:sans-serif;}
#controls {margin:10px; color:white;}
canvas {background:#eee; display:block; touch-action:none;}
button,input,select{margin-right:5px;}
</style>
</head>
<body>

<div id="controls">
<select id="themeSelector">
<option value="3d_chesskid">3D ChessKid</option>
<option value="3d_wood">3D Wood</option>
<option value="alpha">Alpha</option>
<option value="neo">Neo</option>
</select>
Room code: <input id="roomCode" placeholder="1234">
<button id="createRoom">Create</button>
<button id="joinRoom">Join</button>
</div>

<canvas id="board" width="720" height="720"></canvas>

<script>
// ---------------- CONFIG ----------------
const pieceNames = ["wp","bp","wr","br","wn","bn","wb","bb","wq","bq","wk","bk"];
let theme = "3d_chesskid";
const pieceImages = {};
let imagesLoaded = false;

function loadTheme(t){
    theme = t;
    imagesLoaded = false;
    let loaded = 0;
    pieceNames.forEach(p=>{
        const img = new Image();
        img.src = `https://images.chesscomfiles.com/chess-themes/pieces/${theme}/${p}.png`;
        img.onload = ()=>{
            loaded++;
            if(loaded === pieceNames.length){
                imagesLoaded = true;
                draw();
            }
        };
        pieceImages[p] = img;
    });
}

// ---------------- CANVAS ----------------
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const SQ = canvas.width/8;

let board = [
["br","bn","bb","bq","bk","bb","bn","br"],
["bp","bp","bp","bp","bp","bp","bp","bp"],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["wp","wp","wp","wp","wp","wp","wp","wp"],
["wr","wn","wb","wq","wk","wb","wn","wr"]
];

let turn="w", selected=null, legalMoves=[], dragging=false, dragPiece=null, lastMove=null;
let kingPos = {"w":[7,4], "b":[0,4]}, castling={"w":[true,true],"b":[true,true]}, enPassant=null;

// ---------------- DRAW ----------------
function draw(){
    if(!imagesLoaded) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let r=0;r<8;r++){
        for(let c=0;c<8;c++){
            ctx.fillStyle=(r+c)%2==0?"#eee":"#999";
            ctx.fillRect(c*SQ,r*SQ,SQ,SQ);
            if(lastMove){
                const [sr,sc,er,ec]=lastMove;
                if((r==sr&&c==sc)||(r==er&&c==ec)){
                    ctx.strokeStyle="yellow";
                    ctx.lineWidth=3;
                    ctx.strokeRect(c*SQ,r*SQ,SQ,SQ);
                }
            }
            if(board[r][c] && pieceImages[board[r][c]]){
                ctx.drawImage(pieceImages[board[r][c]],c*SQ,r*SQ,SQ,SQ);
            }
        }
    }
    if(dragging && dragPiece){
        const [r,c]=dragPiece;
        const img=pieceImages[board[r][c]];
        if(img) ctx.drawImage(img, mouseX-SQ/2, mouseY-SQ/2, SQ,SQ);
    }
}

// ---------------- UTILS ----------------
function inBounds(r,c){return r>=0&&r<8&&c>=0&&c<8;}
function copyBoard(b){return b.map(r=>r.slice());}

// ---------------- MOVE LOGIC ----------------
function rawMoves(r,c){
    const piece=board[r][c]; if(!piece) return [];
    const color=piece[0], t=piece[1]; const moves=[];
    if(t=="p"){
        const d=color=="w"?-1:1;
        if(inBounds(r+d,c) && board[r+d][c]=="") moves.push([r+d,c]);
        if((r==6&&color=="w")||(r==1&&color=="b")) if(board[r+2*d][c]=="") moves.push([r+2*d,c]);
        for(const dc of [-1,1]){
            const nr=r+d,nc=c+dc;
            if(inBounds(nr,nc)){
                if(board[nr][nc] && board[nr][nc][0]!=color) moves.push([nr,nc]);
                if(enPassant && enPassant[0]==nr && enPassant[1]==nc) moves.push([nr,nc]);
            }
        }
    }
    if(t=="r"||t=="q"){
        for(const [dr,dc] of [[1,0],[-1,0],[0,1],[0,-1]]){
            let nr=r,nc=c;
            while(true){nr+=dr; nc+=dc; if(!inBounds(nr,nc)) break; if(board[nr][nc]=="") moves.push([nr,nc]); else {if(board[nr][nc][0]!=color)moves.push([nr,nc]); break;}}
        }
    }
    if(t=="b"||t=="q"){
        for(const [dr,dc] of [[1,1],[1,-1],[-1,1],[-1,-1]]){
            let nr=r,nc=c;
            while(true){nr+=dr; nc+=dc; if(!inBounds(nr,nc)) break; if(board[nr][nc]=="") moves.push([nr,nc]); else {if(board[nr][nc][0]!=color)moves.push([nr,nc]); break;}}
        }
    }
    if(t=="n"){
        for(const [dr,dc] of [[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]]){
            const nr=r+dr,nc=c+dc; if(inBounds(nr,nc) && (!board[nr][nc]||board[nr][nc][0]!=color)) moves.push([nr,nc]);
        }
    }
    if(t=="k"){
        for(const dr of [-1,0,1]) for(const dc of [-1,0,1]){
            const nr=r+dr,nc=c+dc;
            if(inBounds(nr,nc) && (!board[nr][nc]||board[nr][nc][0]!=color)) moves.push([nr,nc]);
        }
    }
    return moves;
}

function inCheck(color){
    const [kr,kc]=kingPos[color]; const enemy=color=="w"?"b":"w";
    for(let r=0;r<8;r++) for(let c=0;c<8;c++){
        if(board[r][c] && board[r][c][0]==enemy) if(rawMoves(r,c).some(([x,y])=>x==kr&&y==kc)) return true;
    }
    return false;
}

function getLegalMoves(r,c){
    const piece=board[r][c]; if(!piece) return [];
    const color=piece[0]; const moves=[];
    for(const [er,ec] of rawMoves(r,c)){
        const temp=board[er][ec]; board[er][ec]=piece; board[r][c]="";
        const oldKing=kingPos[color].slice();
        if(piece[1]=="k") kingPos[color]=[er,ec];
        if(!inCheck(color)) moves.push([er,ec]);
        board[r][c]=piece; board[er][ec]=temp; kingPos[color]=oldKing;
    }
    return moves;
}

function move(sr,sc,er,ec){
    const piece=board[sr][sc];
    lastMove=[sr,sc,er,ec];
    // en passant
    if(piece[1]=="p" && enPassant && er==enPassant[0] && ec==enPassant[1]) board[sr][ec]="";
    board[er][ec]=piece; board[sr][sc]="";
    // promotion
    if(piece[1]=="p" && (er==0||er==7)) board[er][ec]=piece[0]+"q";
    if(piece[1]=="k") kingPos[piece[0]]=[er,ec];
    enPassant=null;
    if(piece[1]=="p" && Math.abs(sr-er)==2) enPassant=[(sr+er)/2,sc];
    turn=turn=="w"?"b":"w";
    draw();
}

// ---------------- MOUSE & TOUCH EVENTS ----------------
let mouseX=0, mouseY=0;

function getMousePos(e){
    const rect=canvas.getBoundingClientRect();
    if(e.touches) return {x:e.touches[0].clientX-rect.left, y:e.touches[0].clientY-rect.top};
    return {x:e.offsetX, y:e.offsetY};
}

canvas.addEventListener("mousedown", startDrag);
canvas.addEventListener("mousemove", doDrag);
canvas.addEventListener("mouseup", endDrag);

canvas.addEventListener("touchstart", startDrag);
canvas.addEventListener("touchmove", doDrag);
canvas.addEventListener("touchend", endDrag);

function startDrag(e){
    const pos=getMousePos(e); mouseX=pos.x; mouseY=pos.y;
    const r=Math.floor(mouseY/SQ), c=Math.floor(mouseX/SQ);
    if(board[r][c] && board[r][c][0]==turn){dragging=true; dragPiece=[r,c]; legalMoves=getLegalMoves(r,c);}
}
function doDrag(e){
    if(dragging){const pos=getMousePos(e); mouseX=pos.x; mouseY=pos.y; draw();}
}
function endDrag(e){
    if(dragging && dragPiece){
        const pos=getMousePos(e); const r=Math.floor(pos.y/SQ), c=Math.floor(pos.x/SQ);
        const [sr,sc]=dragPiece;
        if(legalMoves.some(([x,y])=>x==r&&y==c)) move(sr,sc,r,c);
        dragging=false; dragPiece=null; legalMoves=[];
    }
}

// ---------------- ROOM CODE ----------------
let room=null;
document.getElementById("createRoom").addEventListener("click",()=>{
    room=document.getElementById("roomCode").value||Math.floor(Math.random()*9000+1000);
    alert("Room created: "+room+"\nShare code to join!");
});
document.getElementById("joinRoom").addEventListener("click",()=>{
    const code=document.getElementById("roomCode").value;
    if(code==room) alert("Connected to room "+code+" ✅");
    else alert("Wrong code ❌");
});

// ---------------- THEME ----------------
document.getElementById("themeSelector").addEventListener("change", e=>{loadTheme(e.target.value);});

// ---------------- INITIAL LOAD ----------------
window.onload = ()=>{loadTheme(theme); draw();};

</script>
</body>
</html>
