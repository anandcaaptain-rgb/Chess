<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHESS — Classic Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');

  :root {
    --bg: #0d0d0f;
    --bg2: #13131a;
    --surface: #1a1a24;
    --surface2: #22223a;
    --border: #2e2e4a;
    --accent: #c9a84c;
    --accent2: #e8c96a;
    --light: #f0ead6;
    --muted: #6e6e8a;
    --danger: #c94c4c;
    --green: #4caf7d;
    --light-sq: #f0d9b5;
    --dark-sq: #b58863;
    --highlight: rgba(201,168,76,0.55);
    --legal: rgba(0,0,0,0.22);
    --check: rgba(201,76,76,0.7);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; background: var(--bg); color: var(--light); font-family: 'Crimson Pro', Georgia, serif; overflow-x: hidden; }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; }

  #home {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .home-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, #1e1a3a 0%, #0d0d0f 70%);
    z-index: 0;
  }
  .home-bg::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .chess-deco {
    position: absolute;
    font-size: 18vw;
    opacity: 0.03;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) rotate(-15deg);
    z-index: 0;
    pointer-events: none;
    user-select: none;
  }
  .home-content { position: relative; z-index: 1; text-align: center; }
  .logo-crown { font-size: 4rem; margin-bottom: 0.5rem; filter: drop-shadow(0 0 30px rgba(201,168,76,0.4)); }
  .logo-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(3rem,8vw,6rem);
    font-weight: 900;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(201,168,76,0.3), 0 2px 0 rgba(0,0,0,0.8);
    margin-bottom: 0.3rem;
  }
  .logo-sub {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 1.3rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    margin-bottom: 3.5rem;
  }
  .menu-cards {
    display: flex;
    gap: 2rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .menu-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2.5rem 3rem;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    min-width: 240px;
    text-align: center;
  }
  .menu-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.08) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .menu-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(201,168,76,0.1); }
  .menu-card:hover::before { opacity: 1; }
  .menu-card:active { transform: translateY(-2px); }
  .card-icon { font-size: 3.5rem; margin-bottom: 1rem; display: block; }
  .card-title { font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 600; color: var(--accent); letter-spacing: 0.15em; margin-bottom: 0.5rem; }
  .card-desc { font-size: 1rem; color: var(--muted); font-style: italic; }
  .card-badge {
    position: absolute; top: 1rem; right: 1rem;
    background: var(--accent); color: #000;
    font-family: 'Cinzel', serif; font-size: 0.6rem;
    font-weight: 600; letter-spacing: 0.1em;
    padding: 0.2rem 0.5rem; border-radius: 2px;
  }

  #lobby, #botSetup {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .lobby-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .lobby-title { font-family: 'Cinzel', serif; font-size: 1.8rem; color: var(--accent); margin-bottom: 0.5rem; letter-spacing: 0.1em; }
  .lobby-sub { color: var(--muted); font-style: italic; margin-bottom: 2rem; }
  .lobby-divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  .room-id-display {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem 1.5rem;
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    margin: 1.5rem 0;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .room-id-display:hover { border-color: var(--accent); }
  .room-id-label { font-size: 0.85rem; color: var(--muted); font-style: italic; margin-bottom: 0.5rem; }
  .input-group { margin-bottom: 1.2rem; text-align: left; }
  .input-group label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.4rem; font-style: italic; letter-spacing: 0.05em; }
  .input-group input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.75rem 1rem;
    color: var(--light);
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: var(--accent); }
  .btn {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    padding: 0.8rem 2rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--light); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-full { width: 100%; display: block; }
  .btn + .btn { margin-top: 0.75rem; }
  .back-btn {
    position: fixed; top: 1.5rem; left: 1.5rem;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); font-family: 'Cinzel', serif;
    font-size: 0.8rem; letter-spacing: 0.1em;
    padding: 0.5rem 1rem; border-radius: 4px;
    cursor: pointer; transition: all 0.2s; z-index: 100;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
  .status-msg { margin-top: 1rem; font-style: italic; color: var(--muted); font-size: 0.95rem; min-height: 1.4rem; }
  .status-msg.ok { color: var(--green); }
  .status-msg.err { color: var(--danger); }
  .status-msg.wait { color: var(--accent); }

  #game {
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 1rem;
    background: var(--bg);
  }
  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 900px;
    padding: 0.75rem 0;
    margin-bottom: 0.5rem;
  }
  .game-logo { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--accent); letter-spacing: 0.2em; }
  .game-status-bar {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 1rem;
  }

  .diff-grid { display: flex; gap: 0.75rem; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .diff-btn {
    font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 0.1em;
    padding: 0.6rem 1.2rem; border: 1px solid var(--border);
    background: transparent; color: var(--muted); border-radius: 4px;
    cursor: pointer; transition: all 0.2s;
  }
  .diff-btn:hover, .diff-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(201,168,76,0.05); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .menu-cards { flex-direction: column; align-items: center; }
    .menu-card { min-width: 280px; padding: 2rem; }
  }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-bg"></div>
  <div class="chess-deco">♛</div>
  <div class="home-content">
    <div class="logo-crown">♚</div>
    <div class="logo-title">CHESS</div>
    <div class="logo-sub">timeless strategy · infinite depth</div>
    <div class="menu-cards">
      <div class="menu-card" onclick="showBotSetup()">
        <span class="card-icon">🤖</span>
        <div class="card-title">vs Engine</div>
        <div class="card-desc">Challenge our chess engine</div>
        <div class="card-badge">1400+ ELO</div>
      </div>
      <div class="menu-card" onclick="showLobby()">
        <span class="card-icon">🌐</span>
        <div class="card-title">Play a Friend</div>
        <div class="card-desc">Real-time online match</div>
      </div>
    </div>
  </div>
</div>

<!-- BOT SETUP -->
<div id="botSetup" class="screen">
  <button class="back-btn" onclick="goHome()">← BACK</button>
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:2rem;min-height:100vh;">
    <div class="lobby-box">
      <div class="lobby-title">Engine Match</div>
      <div class="lobby-sub">Configure your game</div>
      <hr class="lobby-divider">
      <div class="input-group" style="text-align:left">
        <label>DIFFICULTY</label>
      </div>
      <div class="diff-grid">
        <button class="diff-btn active" data-depth="1" onclick="setDiff(this,1)">Beginner</button>
        <button class="diff-btn" data-depth="2" onclick="setDiff(this,2)">Casual</button>
        <button class="diff-btn" data-depth="3" onclick="setDiff(this,3)">Club</button>
        <button class="diff-btn" data-depth="4" onclick="setDiff(this,4)">Strong</button>
        <button class="diff-btn" data-depth="5" onclick="setDiff(this,5)">Master</button>
      </div>
      <div class="input-group" style="text-align:left">
        <label>PLAY AS</label>
        <div style="display:flex;gap:1rem;margin-top:0.5rem;">
          <button class="diff-btn active" id="colorWhite" onclick="setColor('white')">♔ White</button>
          <button class="diff-btn" id="colorBlack" onclick="setColor('black')">♚ Black</button>
          <button class="diff-btn" id="colorRandom" onclick="setColor('random')">⚄ Random</button>
        </div>
      </div>
      <hr class="lobby-divider">
      <button class="btn btn-primary btn-full" onclick="startBotGame()">BEGIN GAME</button>
    </div>
  </div>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
  <button class="back-btn" onclick="goHome()">← BACK</button>
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:2rem;min-height:100vh;">
    <div class="lobby-box">
      <div class="lobby-title">Online Match</div>
      <div class="lobby-sub">Share a room with your friend</div>
      <hr class="lobby-divider">
      <div class="room-id-label">Create a room and share the code</div>
      <div class="room-id-display" onclick="copyRoomId()" title="Click to copy" id="roomIdDisplay">——</div>
      <button class="btn btn-primary btn-full" onclick="createRoom()">CREATE ROOM</button>
      <hr class="lobby-divider">
      <div class="input-group">
        <label>JOIN WITH CODE</label>
        <input type="text" id="joinCodeInput" placeholder="ENTER CODE" maxlength="6" oninput="this.value=this.value.toUpperCase()">
      </div>
      <button class="btn btn-ghost btn-full" onclick="joinRoom()">JOIN ROOM</button>
      <div id="lobbyStatus" class="status-msg"></div>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <button class="back-btn" onclick="goHome()">← BACK</button>
  <div class="game-header">
    <div class="game-logo">CHESS</div>
    <div class="game-status-bar" id="gameStatus">Game in progress</div>
  </div>
</div>

<script>
// ============ STATE MANAGEMENT ============
let gameState = {
  difficulty: 3,
  playerColor: 'white',
  roomId: null,
  gameMode: null // 'bot' or 'online'
};

// ============ SCREEN NAVIGATION ============
function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
}

function goHome() {
  showScreen('home');
}

function showBotSetup() {
  showScreen('botSetup');
}

function showLobby() {
  showScreen('lobby');
}

function confirmBack() {
  if (confirm('Leave the game?')) {
    goHome();
  }
}

// ============ BOT SETUP ============
function setDiff(element, depth) {
  document.querySelectorAll('.diff-btn[data-depth]').forEach(btn => btn.classList.remove('active'));
  element.classList.add('active');
  gameState.difficulty = depth;
}

function setColor(color) {
  document.querySelectorAll('.diff-btn#color' + color.charAt(0).toUpperCase() + color.slice(1)).forEach(btn => btn.classList.remove('active'));
  document.getElementById('color' + color.charAt(0).toUpperCase() + color.slice(1)).classList.add('active');
  gameState.playerColor = color;
}

function startBotGame() {
  gameState.gameMode = 'bot';
  alert(`Starting game vs Engine (Difficulty: ${gameState.difficulty}) as ${gameState.playerColor}`);
  showScreen('game');
  document.getElementById('gameStatus').textContent = `Playing vs Engine (Level ${gameState.difficulty})`;
}

// ============ LOBBY / ONLINE ============
function createRoom() {
  const roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
  gameState.roomId = roomId;
  document.getElementById('roomIdDisplay').textContent = roomId;
  document.getElementById('lobbyStatus').textContent = 'Room created! Share the code with your friend.';
  document.getElementById('lobbyStatus').classList.add('ok');
}

function copyRoomId() {
  const roomId = gameState.roomId;
  if (!roomId) {
    alert('Create a room first!');
    return;
  }
  navigator.clipboard.writeText(roomId).then(() => {
    const status = document.getElementById('lobbyStatus');
    status.textContent = 'Room code copied to clipboard!';
    status.classList.add('ok');
    setTimeout(() => status.textContent = '', 2000);
  });
}

function joinRoom() {
  const code = document.getElementById('joinCodeInput').value.trim();
  if (!code) {
    document.getElementById('lobbyStatus').textContent = 'Please enter a code';
    document.getElementById('lobbyStatus').classList.add('err');
    return;
  }
  
  const status = document.getElementById('lobbyStatus');
  status.textContent = 'Joining room...';
  status.classList.remove('ok', 'err');
  status.classList.add('wait');
  
  // Simulate joining after 1 second
  setTimeout(() => {
    gameState.roomId = code;
    gameState.gameMode = 'online';
    status.textContent = 'Joined! Waiting for opponent...';
    status.classList.remove('wait');
    status.classList.add('ok');
    
    // Start game after 2 more seconds
    setTimeout(() => {
      showScreen('game');
      document.getElementById('gameStatus').textContent = `Online match - Room: ${code}`;
    }, 2000);
  }, 1000);
}
</script>

</body>
</html>
