<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Chess Online</title>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:sans-serif; background:#1a1a1a; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }
  
  #container { display:flex; flex-direction:column; align-items:center; gap:15px; }
  
  h2 { margin-bottom:10px; color:#4CAF50; }
  
  canvas { border:4px solid #4CAF50; background:#eee; touch-action:none; cursor:grab; display:block; }
  canvas:active { cursor:grabbing; }
  
  #controls { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  
  input { 
    padding:8px 12px; 
    width:120px; 
    text-align:center; 
    border:2px solid #4CAF50; 
    background:#222; 
    color:#fff;
    border-radius:4px;
    font-size:14px;
  }
  
  button { 
    padding:8px 15px; 
    cursor:pointer; 
    background:#4CAF50; 
    color:#fff;
    border:none;
    border-radius:4px;
    font-weight:bold;
    transition:background 0.3s;
  }
  
  button:hover { background:#45a049; }
  button:disabled { background:#666; cursor:not-allowed; }
  
  #status { 
    font-size:16px; 
    padding:10px 15px; 
    border:2px solid #4CAF50; 
    border-radius:4px;
    min-height:20px;
    text-align:center;
    min-width:250px;
  }
  
  .error { color:#ff6b6b; }
  .success { color:#4CAF50; }
  .info { color:#64B5F6; }
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="container">
  <h2>♟️ Lucky Chess Online ♟️</h2>
  <canvas id="board" width="512" height="512"></canvas>

  <div id="controls">
    <input id="roomCode" placeholder="Room Code" type="text">
    <button id="createRoom">Create Room</button>
    <button id="joinRoom">Join Room</button>
    <button id="leaveRoom">Leave Room</button>
  </div>

  <div id="status">Not connected</div>
</div>

<script>
// ====================== Firebase Config ======================
const firebaseConfig = {
  apiKey: "AIzaSyCDANKHVcRLQ5qQ8mT3j3aKv1qKV2Pxd5s",
  authDomain: "chess-game-a3f7c.firebaseapp.com",
  databaseURL: "https://chess-game-a3f7c-default-rtdb.firebaseio.com",
  projectId: "chess-game-a3f7c",
  storageBucket: "chess-game-a3f7c.firebasestorage.app",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abcdef"
};

try {
  firebase.initializeApp(firebaseConfig);
} catch(e) {
  console.warn("Firebase config needs update. Using local mode only.");
}

const db = firebase.database();

// ====================== Chess Setup ======================
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const SQ = canvas.width / 8;

let board = [
  ["br","bn","bb","bq","bk","bb","bn","br"],
  ["bp","bp","bp","bp","bp","bp","bp","bp"],
  ["","","","","","","",""],
  ["","","","","","","",""],
  ["","","","","","","",""],
  ["","","","","","","",""],
  ["wp","wp","wp","wp","wp","wp","wp","wp"],
  ["wr","wn","wb","wq","wk","wb","wn","wr"]
];

let turn = "w";
let legalMoves = [];
let dragging = false;
let dragPiece = null;
let lastMove = null;
let kingPos = { "w": [7,4], "b": [0,4] };
let enPassant = null;
let roomRef = null;
let playerColor = null;
let currentRoom = null;
let isListening = false;

// Load piece images (FIXED PATH)
const pieces = {};
const pieceNames = ["wp","wn","wb","wr","wq","wk","bp","bn","bb","br","bq","bk"];

function loadPieces() {
  let loaded = 0;
  pieceNames.forEach(p => {
    const img = new Image();
    img.src = `https://images.chesscomfiles.com/chess-themes/pieces/neo/${p}.png`;
    img.onload = () => {
      loaded++;
      if(loaded === pieceNames.length) {
        draw();
      }
    };
    img.onerror = () => {
      console.warn(`Failed to load piece: ${p}`);
      loaded++;
      if(loaded === pieceNames.length) draw();
    };
    pieces[p] = img;
  });
}

loadPieces();

// ====================== Drawing ======================
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw board
  for(let r = 0; r < 8; r++) {
    for(let c = 0; c < 8; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? "#f0d9b5" : "#baca44";
      ctx.fillRect(c*SQ, r*SQ, SQ, SQ);
      
      // Highlight last move
      if(lastMove) {
        const [sr,sc,er,ec] = lastMove;
        if((r === sr && c === sc) || (r === er && c === ec)) {
          ctx.fillStyle = "rgba(247, 247, 105, 0.6)";
          ctx.fillRect(c*SQ, r*SQ, SQ, SQ);
        }
      }
      
      // Highlight legal moves
      if(legalMoves.some(m => m[0] === r && m[1] === c)) {
        ctx.fillStyle = "rgba(100, 200, 100, 0.4)";
        ctx.fillRect(c*SQ, r*SQ, SQ, SQ);
      }
      
      // Draw pieces
      const piece = board[r][c];
      if(piece && !(dragging && dragPiece && dragPiece[0] === r && dragPiece[1] === c)) {
        if(pieces[piece] && pieces[piece].complete) {
          ctx.drawImage(pieces[piece], c*SQ, r*SQ, SQ, SQ);
        }
      }
    }
  }
  
  // Draw dragging piece
  if(dragging && dragPiece) {
    const piece = board[dragPiece[0]][dragPiece[1]];
    if(piece && pieces[piece] && pieces[piece].complete) {
      ctx.drawImage(pieces[piece], dragX - SQ/2, dragY - SQ/2, SQ, SQ);
    }
  }
}

// ====================== Chess Logic ======================
function inBounds(r, c) {
  return r >= 0 && r < 8 && c >= 0 && c < 8;
}

function copyBoard(b) {
  return b.map(row => [...row]);
}

function rawMoves(r, c) {
  const piece = board[r][c];
  if(!piece) return [];
  
  const color = piece[0];
  const type = piece[1];
  let moves = [];
  
  // Pawn
  if(type === "p") {
    const direction = color === "w" ? -1 : 1;
    const startRow = color === "w" ? 6 : 1;
    
    // Move forward
    const forwardRow = r + direction;
    if(inBounds(forwardRow, c) && board[forwardRow][c] === "") {
      moves.push([forwardRow, c]);
      
      // Double move from start
      if(r === startRow && board[r + 2*direction][c] === "") {
        moves.push([r + 2*direction, c]);
      }
    }
    
    // Captures
    for(const dc of [-1, 1]) {
      const nr = r + direction;
      const nc = c + dc;
      if(inBounds(nr, nc)) {
        if(board[nr][nc] && board[nr][nc][0] !== color) {
          moves.push([nr, nc]);
        }
        // En passant
        if(enPassant && enPassant[0] === nr && enPassant[1] === nc) {
          moves.push([nr, nc]);
        }
      }
    }
  }
  
  // Rook & Queen (straight lines)
  if(type === "r" || type === "q") {
    for(const [dr, dc] of [[1,0], [-1,0], [0,1], [0,-1]]) {
      let nr = r + dr, nc = c + dc;
      while(inBounds(nr, nc)) {
        if(board[nr][nc] === "") {
          moves.push([nr, nc]);
        } else {
          if(board[nr][nc][0] !== color) {
            moves.push([nr, nc]);
          }
          break;
        }
        nr += dr;
        nc += dc;
      }
    }
  }
  
  // Bishop & Queen (diagonals)
  if(type === "b" || type === "q") {
    for(const [dr, dc] of [[1,1], [1,-1], [-1,1], [-1,-1]]) {
      let nr = r + dr, nc = c + dc;
      while(inBounds(nr, nc)) {
        if(board[nr][nc] === "") {
          moves.push([nr, nc]);
        } else {
          if(board[nr][nc][0] !== color) {
            moves.push([nr, nc]);
          }
          break;
        }
        nr += dr;
        nc += dc;
      }
    }
  }
  
  // Knight
  if(type === "n") {
    for(const [dr, dc] of [[2,1], [2,-1], [-2,1], [-2,-1], [1,2], [1,-2], [-1,2], [-1,-2]]) {
      const nr = r + dr, nc = c + dc;
      if(inBounds(nr, nc)) {
        if(!board[nr][nc] || board[nr][nc][0] !== color) {
          moves.push([nr, nc]);
        }
      }
    }
  }
  
  // King
  if(type === "k") {
    for(let dr = -1; dr <= 1; dr++) {
      for(let dc = -1; dc <= 1; dc++) {
        if(dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if(inBounds(nr, nc)) {
          if(!board[nr][nc] || board[nr][nc][0] !== color) {
            moves.push([nr, nc]);
          }
        }
      }
    }
  }
  
  return moves;
}

function inCheck(color) {
  const [kr, kc] = kingPos[color];
  const enemy = color === "w" ? "b" : "w";
  
  for(let r = 0; r < 8; r++) {
    for(let c = 0; c < 8; c++) {
      if(board[r][c] && board[r][c][0] === enemy) {
        if(rawMoves(r, c).some(m => m[0] === kr && m[1] === kc)) {
          return true;
        }
      }
    }
  }
  return false;
}

function getLegalMoves(r, c) {
  const piece = board[r][c];
  if(!piece) return [];
  
  const color = piece[0];
  let moves = [];
  
  for(const [er, ec] of rawMoves(r, c)) {
    // Make move
    const temp = board[er][ec];
    board[er][ec] = piece;
    board[r][c] = "";
    
    // Update king position
    const oldKing = kingPos[color].slice();
    if(piece[1] === "k") kingPos[color] = [er, ec];
    
    // Check if legal
    if(!inCheck(color)) {
      moves.push([er, ec]);
    }
    
    // Undo move
    board[r][c] = piece;
    board[er][ec] = temp;
    kingPos[color] = oldKing;
  }
  
  return moves;
}

function makeMove(sr, sc, er, ec) {
  const piece = board[sr][sc];
  
  // En passant capture
  if(piece[1] === "p" && enPassant && er === enPassant[0] && ec === enPassant[1]) {
    board[sr][ec] = "";
  }
  
  // Move piece
  board[er][ec] = piece;
  board[sr][sc] = "";
  
  // Update king position
  if(piece[1] === "k") {
    kingPos[piece[0]] = [er, ec];
  }
  
  // Pawn promotion
  if(piece[1] === "p" && (er === 0 || er === 7)) {
    board[er][ec] = piece[0] + "q";
  }
  
  // En passant setup
  if(piece[1] === "p" && Math.abs(sr - er) === 2) {
    enPassant = [(sr + er) / 2, sc];
  } else {
    enPassant = null;
  }
  
  // Update game state
  lastMove = [sr, sc, er, ec];
  turn = turn === "w" ? "b" : "w";
  
  draw();
  
  // Save to Firebase if in room
  if(roomRef) {
    syncToFirebase();
  }
}

function syncToFirebase() {
  if(!roomRef) return;
  
  roomRef.set({
    board: board,
    turn: turn,
    kingPos: kingPos,
    enPassant: enPassant,
    lastMove: lastMove,
    timestamp: firebase.database.ServerValue.TIMESTAMP
  }).catch(err => {
    updateStatus("Error syncing to Firebase: " + err.message, "error");
  });
}

// ====================== Drag & Drop ======================
let dragX = 0, dragY = 0;

function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  if(e.touches) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  }
  return {
    x: e.offsetX,
    y: e.offsetY
  };
}

canvas.addEventListener("mousedown", startDrag);
canvas.addEventListener("mousemove", doDrag);
canvas.addEventListener("mouseup", endDrag);
canvas.addEventListener("touchstart", startDrag);
canvas.addEventListener("touchmove", doDrag);
canvas.addEventListener("touchend", endDrag);

function startDrag(e) {
  if(!playerColor) {
    updateStatus("Join or create a room first!", "error");
    return;
  }
  
  const pos = getMousePos(e);
  dragX = pos.x;
  dragY = pos.y;
  
  const r = Math.floor(pos.y / SQ);
  const c = Math.floor(pos.x / SQ);
  
  if(!inBounds(r, c)) return;
  
  const piece = board[r][c];
  if(piece && piece[0] === playerColor && piece[0] === turn) {
    dragging = true;
    dragPiece = [r, c];
    legalMoves = getLegalMoves(r, c);
    draw();
  }
}

function doDrag(e) {
  if(dragging) {
    const pos = getMousePos(e);
    dragX = pos.x;
    dragY = pos.y;
    draw();
  }
}

function endDrag(e) {
  if(dragging && dragPiece) {
    const pos = getMousePos(e);
    const r = Math.floor(pos.y / SQ);
    const c = Math.floor(pos.x / SQ);
    
    const [sr, sc] = dragPiece;
    
    if(inBounds(r, c) && legalMoves.some(m => m[0] === r && m[1] === c)) {
      makeMove(sr, sc, r, c);
    } else {
      draw();
    }
  }
  
  dragging = false;
  dragPiece = null;
  legalMoves = [];
}

// ====================== Firebase Sync ======================
function updateStatus(msg, type = "info") {
  const status = document.getElementById("status");
  status.className = type;
  status.innerText = msg;
}

function resetGame() {
  board = [
    ["br","bn","bb","bq","bk","bb","bn","br"],
    ["bp","bp","bp","bp","bp","bp","bp","bp"],
    ["","","","","","","",""],
    ["","","","","","","",""],
    ["","","","","","","",""],
    ["","","","","","","",""],
    ["wp","wp","wp","wp","wp","wp","wp","wp"],
    ["wr","wn","wb","wq","wk","wb","wn","wr"]
  ];
  turn = "w";
  lastMove = null;
  enPassant = null;
  kingPos = { "w": [7,4], "b": [0,4] };
  legalMoves = [];
  dragging = false;
  dragPiece = null;
  draw();
}

document.getElementById("createRoom").addEventListener("click", () => {
  const code = document.getElementById("roomCode").value || Math.floor(Math.random() * 9000 + 1000).toString();
  
  if(!code) {
    updateStatus("Enter a room code!", "error");
    return;
  }
  
  currentRoom = code;
  roomRef = db.ref("rooms/" + code);
  playerColor = "w";
  
  resetGame();
  syncToFirebase();
  
  // Listen for opponent moves
  if(isListening) roomRef.off();
  isListening = true;
  
  roomRef.on("value", (snapshot) => {
    const data = snapshot.val();
    if(data && data.board) {
      // Only update if opponent moved
      if(JSON.stringify(data.board) !== JSON.stringify(board)) {
        board = data.board;
        turn = data.turn;
        kingPos = data.kingPos || kingPos;
        enPassant = data.enPassant;
        lastMove = data.lastMove;
        draw();
      }
    }
  }, (err) => {
    updateStatus("Firebase error: " + err.message, "error");
  });
  
  updateStatus(`Room Created: ${code} (You are WHITE) ♔`, "success");
  document.getElementById("roomCode").value = "";
});

document.getElementById("joinRoom").addEventListener("click", () => {
  const code = document.getElementById("roomCode").value;
  
  if(!code) {
    updateStatus("Enter a room code!", "error");
    return;
  }
  
  currentRoom = code;
  roomRef = db.ref("rooms/" + code);
  playerColor = "b";
  
  roomRef.once("value").then((snapshot) => {
    if(snapshot.exists()) {
      const data = snapshot.val();
      board = data.board || board;
      turn = data.turn || "w";
      kingPos = data.kingPos || kingPos;
      enPassant = data.enPassant;
      lastMove = data.lastMove;
      
      resetGame();
      Object.assign(board, data.board || []);
      turn = data.turn || "w";
      kingPos = data.kingPos || { "w": [7,4], "b": [0,4] };
      enPassant = data.enPassant || null;
      lastMove = data.lastMove || null;
      
      draw();
      
      // Listen for host moves
      if(isListening) roomRef.off();
      isListening = true;
      
      roomRef.on("value", (snapshot) => {
        const data = snapshot.val();
        if(data && data.board) {
          if(JSON.stringify(data.board) !== JSON.stringify(board)) {
            board = data.board;
            turn = data.turn;
            kingPos = data.kingPos || kingPos;
            enPassant = data.enPassant;
            lastMove = data.lastMove;
            draw();
          }
        }
      }, (err) => {
        updateStatus("Firebase error: " + err.message, "error");
      });
      
      updateStatus(`Joined Room: ${code} (You are BLACK) ♞`, "success");
      document.getElementById("roomCode").value = "";
    } else {
      updateStatus("Room not found!", "error");
    }
  }).catch((err) => {
    updateStatus("Error joining room: " + err.message, "error");
  });
});

document.getElementById("leaveRoom").addEventListener("click", () => {
  if(roomRef) {
    roomRef.off();
  }
  playerColor = null;
  currentRoom = null;
  roomRef = null;
  isListening = false;
  resetGame();
  updateStatus("Left room. Not connected.", "info");
});

// Initial draw
draw();
updateStatus("Create or join a room to play", "info");
</script>

</body>
</html>
